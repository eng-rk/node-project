<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard - LeaveTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <style>
        .leave-form-container {
            margin-bottom: 2rem;
            max-width: 600px;
        }
        .form-row {
            display: flex;
            gap: 1rem;
        }
        .form-row .form-group {
            flex: 1;
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <main class="main-content">
        <div class="dashboard-stats glass-container">
            <div class="stat-card">
                <span class="stat-title">Available Leave Balance</span>
                <span class="stat-value" id="leave-balance">--</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Pending Requests</span>
                <span class="stat-value" id="pending-count">--</span>
            </div>
        </div>

        <div class="glass-container leave-form-container">
            <h3 style="margin-bottom: 1.5rem;">Request Leave</h3>
            <form id="leave-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="start-date">Start Date</label>
                        <input type="date" id="start-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="end-date">End Date</label>
                        <input type="date" id="end-date" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reason">Reason (Optional)</label>
                    <input type="text" id="reason" class="form-control" placeholder="E.g., Vacation, Sick leave">
                </div>
                <button type="submit" class="btn btn-primary" style="width: auto; padding-left: 2rem; padding-right: 2rem;">Submit Request</button>
            </form>
        </div>

        <div class="glass-container">
            <h3 style="margin-bottom: 1rem;">My Leave History</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date Requested</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Days</th>
                            <th>Status</th>
                            <th>Reason</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="leave-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/employee.js"></script>
</body>
</html>
