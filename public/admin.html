<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LeaveTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <style>
        .role-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .role-admin { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .role-manager { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .role-employee { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <main class="main-content">
        <div class="dashboard-stats glass-container">
            <div class="stat-card">
                <span class="stat-title">Total Users</span>
                <span class="stat-value" id="total-users">--</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">System Status</span>
                <span class="stat-value" style="color: var(--success);">Online</span>
            </div>
        </div>

        <div class="glass-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>User Management</h3>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User Details</th>
                            <th>Role</th>
                            <th>Assigned Manager</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal for Assigning Role/Manager -->
    <div class="modal-overlay" id="edit-user-modal">
        <div class="glass-container modal-content">
            <div class="modal-header">
                <h3>Edit User</h3>
                <button class="btn-close" id="close-modal">&times;</button>
            </div>
            <form id="edit-user-form">
                <input type="hidden" id="edit-user-id">
                
                <div class="form-group">
                    <label>User Name</label>
                    <input type="text" id="edit-username" class="form-control" disabled>
                </div>

                <div class="form-group">
                    <label for="edit-role">Role</label>
                    <select id="edit-role" class="form-control" required>
                        <option value="employee">Employee</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edit-manager">Assign Manager</label>
                    <select id="edit-manager" class="form-control">
                        <option value="">None / Self</option>
                        <!-- Populated dynamically -->
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
